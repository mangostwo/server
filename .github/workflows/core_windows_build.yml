name: Windows Build (MSVC)

on:
  push:
    branches: [ master, devel ]
  pull_request:
    branches: [ master ]

permissions:
  contents: read

concurrency:
  group: windows-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: windows-2022

    env:
      BUILD_DIR: ${{ github.workspace }}\..\build-msvc
      CCACHE_DIR: ${{ github.workspace }}\..\ccache
      SCCACHE_DIR: ${{ github.workspace }}\..\sccache

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Cache OpenSSL
        id: cache-openssl
        uses: actions/cache@v4
        with:
          path: |
            C:\Program Files\OpenSSL
            C:\Program Files\OpenSSL-Win64
          key: ${{ runner.os }}-openssl-3

      - name: Install OpenSSL
        if: steps.cache-openssl.outputs.cache-hit != 'true'
        run: choco upgrade openssl -y --no-progress

      - name: Locate OpenSSL
        shell: bash
        run: |
          for root in "C:/Program Files/OpenSSL" "C:/Program Files/OpenSSL-Win64"; do
            if [ -d "$root/lib/VC" ]; then
              echo "OPENSSL_ROOT_DIR=$root" >> $GITHUB_ENV
              break
            fi
          done

      - name: Setup MSVC environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Compiler cache
        uses: hendrikmuhs/ccache-action@v1.2
        with:
          variant: sccache
          key: windows-msvc
          max-size: 500M

      - name: Configure
        shell: bash
        run: >
          cmake -S . -B "$BUILD_DIR" -G Ninja
          -DCMAKE_BUILD_TYPE=Release
          -DCMAKE_INSTALL_PREFIX="$BUILD_DIR/install"
          -DCMAKE_C_COMPILER_LAUNCHER=sccache
          -DCMAKE_CXX_COMPILER_LAUNCHER=sccache
          -DBUILD_TOOLS=1
          -DBUILD_MANGOSD=1
          -DBUILD_REALMD=1
          -DSOAP=1
          -DSCRIPT_LIB_ELUNA=1
          -DSCRIPT_LIB_SD3=1
          -DUSE_STORMLIB=1
          -DPCH=1

      - name: Build
        shell: bash
        run: cmake --build "$BUILD_DIR" --parallel

      - name: Verify the working tree is clean
        shell: bash
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::the build modified the source tree"
            git status --porcelain
            exit 1
          fi
